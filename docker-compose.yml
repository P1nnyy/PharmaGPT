version: '3.8'

services:
  # Node.js Gateway / Frontend Dev Server
  # (Assuming frontend is served via Vite Dev Server for now based on conversation)
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile
    command: npm run dev
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
      - DOCKER_ENV=true
      - NODE_ENV=development
    env_file:
      - .env

  # Python AI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m src.api.server
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
    volumes:
      - .:/app
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env
