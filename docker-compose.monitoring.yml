version: '3.9'

services:
  langfuse-server:
    image: langfuse/langfuse:2
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/public/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_started
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
      - NEXTAUTH_SECRET=554850ce1900cbdde4c628e2cd1fafc0b918fb4c310187912dc7d221c858b222
      - SALT=ac1368bf27e6955a2524c20865f0241f7f3448ef05cff7734485434d9c17c389
      - NEXTAUTH_URL=http://localhost:3000
      - HOSTNAME=0.0.0.0
      - TELEMETRY_ENABLED=false
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=langfuse
      - CLICKHOUSE_PASSWORD=password
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - ENCRYPTION_SECRET=7ce657521cb028b57b65331bef2707d9a13c8f97ce7b1a6669f4d7dbd90e442d

  langfuse-worker:
    image: langfuse/langfuse:2
    depends_on:
      db:
        condition: service_started
      clickhouse:
        condition: service_started
      langfuse-server:
        condition: service_healthy
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
      - SKIP_MIGRATIONS=true
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
      - NEXTAUTH_SECRET=554850ce1900cbdde4c628e2cd1fafc0b918fb4c310187912dc7d221c858b222
      - SALT=ac1368bf27e6955a2524c20865f0241f7f3448ef05cff7734485434d9c17c389
      - NEXTAUTH_URL=http://localhost:3000
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=langfuse
      - CLICKHOUSE_PASSWORD=password
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - ENCRYPTION_SECRET=7ce657521cb028b57b65331bef2707d9a13c8f97ce7b1a6669f4d7dbd90e442d

  db:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    user: "101:101"
    container_name: clickhouse
    hostname: clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          memory: 6144M
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_log:/var/log/clickhouse-server
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=langfuse
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=password

  prometheus:
    image: prom/prometheus
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/monitoring/rules.yml:/etc/prometheus/rules.yml
    ports:
      - "9090:9090"
    networks:
      - default

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - default

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - default

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - default

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./logs:/var/log/app
      - ./config/monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - default

  grafana:
    image: grafana/grafana
    volumes:
      - ./config/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./config/monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./config/monitoring/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - default

volumes:
  postgres_data:
  clickhouse_data:
  clickhouse_log:
